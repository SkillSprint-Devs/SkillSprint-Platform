<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History | SkillSprint</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/navbar.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" />
</head>

<body>
  <div id="navbar-placeholder"></div>
  <div class="placeholder-page">
    <div class="content">
      <i class="fa-solid fa-history"></i>
      <h1>History</h1>
      <p>This section is under development.</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/navbar-loader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initNavbar({
        activePage: 'History',
        contextIcon: 'fa-history',
        backUrl: 'history',

        showSearch: false,
        primaryAction: { show: false }
      });
    });

    // Inject Share + Report buttons after navbar renders
    setTimeout(() => {
        // Hide any notification bell rendered by navbar
        document.querySelectorAll(
            '.notification-btn, .notif-btn, .bell-btn, [class*="notif-icon"], [data-notif], .nav-notif'
        ).forEach(el => el.style.display = 'none');

        // Find navbar right area
        const navbarInner = document.querySelector(
            '#navbar-placeholder .navbar-right, #navbar-placeholder .nav-right, #navbar-placeholder .nav-actions, #navbar-placeholder nav'
        );

        const actionsWrap = document.createElement('div');
        actionsWrap.style.cssText = 'display:flex;align-items:center;gap:0.4rem;margin-right:16px;';

        const shareBtn = document.createElement('button');
        shareBtn.className = 'pp-nav-icon-btn';
        shareBtn.title = 'Share Profile';
        shareBtn.innerHTML = '<i class="fa-solid fa-share-nodes"></i>';

        const reportBtn = document.createElement('button');
        reportBtn.id = 'ppNavReportBtn';
        reportBtn.className = 'pp-nav-icon-btn danger';
        reportBtn.title = 'Report Profile';
        reportBtn.innerHTML = '<i class="fa-solid fa-flag"></i>';

        actionsWrap.appendChild(shareBtn);
        actionsWrap.appendChild(reportBtn);

        if (navbarInner) {
            navbarInner.appendChild(actionsWrap);
        } else {
            // Fallback: stick them at end of navbar-placeholder
            document.getElementById('navbar-placeholder').appendChild(actionsWrap);
        }

        // Share handler
        shareBtn.addEventListener('click', () => {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: document.title, url }).catch(() => { });
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    if (typeof showToast === 'function') showToast('Profile link copied!', 'success');
                });
            } else {
                prompt('Copy this link:', url);
            }
        });

        // Report handler – open modal
        reportBtn.addEventListener('click', () => {
            const modal = document.getElementById('ppReportModal');
            if (modal) modal.style.display = 'flex';
        });

        // Report modal cancel
        document.getElementById('ppReportCancelBtn')?.addEventListener('click', () => {
            document.getElementById('ppReportModal').style.display = 'none';
        });

        // Report modal submit
        document.getElementById('ppReportSubmitBtn')?.addEventListener('click', () => {
            const chosen = document.querySelector('input[name="ppReason"]:checked');
            if (!chosen) {
                if (typeof showToast === 'function') showToast('Please select a reason.', 'error');
                return;
            }
            // In a real app, POST /api/reports here
            document.getElementById('ppReportModal').style.display = 'none';
            if (typeof showToast === 'function') showToast('Report submitted. Thank you!', 'success');
        });

        // Close modal on backdrop click
        document.getElementById('ppReportModal')?.addEventListener('click', function (e) {
            if (e.target === this) this.style.display = 'none';
        });
    }, 350);
  </script>
</body>

</html>

<style>
  body {
    background-color: #F9F8D9;
    font-family: "Poppins", sans-serif;
    color: #1A1A1A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .placeholder-page {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .placeholder-page .content {
    text-align: center;
  }

  .placeholder-page i {
    font-size: 3rem;
    color: #DCEF7E;
    margin-bottom: 1rem;
  }

  .placeholder-page h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .placeholder-page p {
    font-size: 1rem;
    color: #555;
    margin-bottom: 1.5rem;
  }

  .back-btn {
    display: inline-block;
    background-color: #1A1A1A;
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
  }

  .back-btn:hover {
    background-color: #333;
  }
</style>
