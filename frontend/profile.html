<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | SkillSprint</title>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #F9F8D9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #1A1A1A; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-top-color: #DCEF62; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .card { text-align: center; background: #fff; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <p>Redirecting to your unified profile...</p>
    </div>

    <script>
        (function() {
            const API_BASE = window.API_BASE_URL || 'http://localhost:5000/api';
            const token = localStorage.getItem('token');
            
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const stored = JSON.parse(localStorage.getItem('user') || '{}');
            const myId = stored._id || stored.id;

            if (myId) {
                window.location.replace(`public-profile.html?user=${myId}`);
            } else {
                // Fallback: fetch /auth/me to get the ID
                fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => {
                    if (!res.ok) throw new Error('Unauthorized');
                    return res.json();
                })
                .then(user => {
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.replace(`public-profile.html?user=${user._id}`);
                })
                .catch(() => {
                    window.location.href = 'login.html';
                });
            }
        })();
    </script>
</body>
</html>
